apiVersion: v1
kind: ConfigMap
metadata:
  name: zigbee2mqtt-config
  namespace: homeassistant
data:
  configuration.yaml: |
    homeassistant: true
    permit_join: true

    mqtt:
      base_topic: zigbee2mqtt
      server: mqtt://mosquitto:1883

    serial:
      port: /dev/ttyUSB0
      baudrate: 115200
      adapter: ezsp

    frontend:
      port: 8080

    advanced:
      log_level: info
